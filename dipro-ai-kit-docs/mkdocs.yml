site_name: Dipro AI Kit
site_description: Bộ công cụ AI agents chuẩn hóa toàn bộ vòng đời phát triển phần mềm tại Dipro
site_author: Dipro Team
docs_dir: docs
repo_url: https://github.com/dipro-vn/dipro-ai-kit

theme:
  name: material
  language: vi
  logo: assets/logo.png
  favicon: assets/logo.png
  font:
    text: Noto Sans JP
    code: Roboto Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Chuyển sang dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Chuyển sang light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/extra.css

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Tổng quan:
    - Giới thiệu: index.md
    - Kiến trúc Monorepo: overview/architecture.md
    - BMAD Workflow: overview/bmad-workflow.md
  - Các Kits:
    - So sánh tất cả Kits: kits/index.md
    - "Kit 1: project-ai-kit": kits/project-ai-kit.md
    - "Kit 2: backend-kit": kits/backend-kit.md
    - "Kit 3: fe-kit": kits/fe-kit.md
    - "Kit 4: mobile-ai-kit": kits/mobile-ai-kit.md
    - "Kit 5: brse-ai-kit": kits/brse-ai-kit.md
    - "Kit 6: qc-kit-agent": kits/qc-kit-agent.md
  - Hướng dẫn:
    - Bắt đầu nhanh: guides/getting-started.md
    - Setup dự án mới: guides/new-project-setup.md
    - Chọn Kit phù hợp: guides/kit-selection.md
  - Tham chiếu:
    - Commands & Slash Commands: reference/commands.md
    - 12 Sub-Agents: reference/agents.md
    - Bảo mật & Chính sách: reference/security.md
    - Tech Stack cố định: reference/stack-constraints.md
    - Video Demo: reference/demo.md

copyright: Copyright &copy; 2025 DIPROTECH Co., Ltd. All rights reserved.

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dipro-vn
